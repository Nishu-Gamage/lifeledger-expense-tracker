<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>LifeLedger Expense Tracker</title>
	<link rel="stylesheet" th:href="@{/css/style-portal.css}">
	<link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Portal Page -->
<div class="home-hero align-items-start">
    <div class="hero-content container">
        <div class="row justify-content-center">
            <div class="col-lg-12 text-white">

                <div class="d-flex justify-content-between align-items-center mt-5 p-3">

                    <h1 class="font-weight-bold display-3 text-primary m-0" style="font-family:cursive;">Life Ledger</h1>

                    <div>
                        <a th:href="@{/registration}" class="btn btn-primary mr-2 btn-lg">会員登録</a>

                        <!-- Login Button Trigger Modal -->
                        <button class="btn btn-primary btn-lg" data-toggle="modal" data-target="#loginModal">ログイン</button>
                    </div>

                </div>

                <div class="text-center mt-5 p-4">
                    <h1 class="mb-5">
                        日々の生活費を追跡し、予算を簡単に管理しましょう。<br>
                        今すぐ支出を追跡し、<br>
                        家計を管理してみましょう。
                    </h1>
                    <!-- Start Button -->
                    <button class="btn btn-warning btn-lg" data-toggle="modal" data-target="#loginModal">始めましょう</button>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal fade" id="loginModal" tabindex="-1" role="dialog" style="background-color: rgba(0,0,0,0.5)">
    <div class="modal-dialog" role="document">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">ログイン</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <form th:action="@{/login}" method="post">

                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" name="username" class="form-control" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>パスワード</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-4 mb-4">ログイン</button>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<!-- Popper -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

<!-- AUTO OPEN LOGIN MODAL -->
<script>
window.onload = function () {

    const params = new URLSearchParams(window.location.search);

    if (params.has('login') || params.has('error')) {
        $('#loginModal').modal('show');
    }

}
</script>
</body>
</html>
